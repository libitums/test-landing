# Applies path-based labels to PRs from the mapping in .github/labeler.yml.
# Uses `pull_request` (not pull_request_target) so the write token is only
# granted for branches pushed to this repo by collaborators.
name: Labeler

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          sync-labels: true
