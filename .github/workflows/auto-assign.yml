# Auto-assign reviewers (from the org pool) and set the author as assignee.
# Configuration lives in .github/auto_assign.yml.
name: Auto Assign

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  add-reviewers:
    # Skip drafts so a work-in-progress PR does not ping the whole reviewer pool.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      # Pinned to a commit SHA (this job holds pull-requests: write).
      - uses: kentaro-m/auto-assign-action@f4648c0a9fdb753479e9e75fc251f507ce17bb7e # v2.0.0
