name: 버그 리포트
description: 예상과 다르게 동작하는 문제를 알려주세요.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: 무슨 일이 있었나요?
      description: 현재 동작과 기대한 동작을 함께 적어주세요.
      placeholder: "~을 했더니 ~가 됩니다. 원래는 ~가 되어야 합니다."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 문제를 재현하는 최소 단계.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false
  - type: input
    id: scope
    attributes:
      label: 영향 범위 (선택)
      description: 관련 앱/패키지 또는 로케일 (예 k-drama, packages/ui, ar).
    validations:
      required: false
